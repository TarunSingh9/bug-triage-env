name: bug-triage-env
version: "1.0.0"
description: >
  A real-world software engineering environment where an AI agent triages
  bug reports, prioritizes issues, assigns severity labels, routes to the
  correct team, and suggests initial investigation steps. Simulates the
  daily workflow of an engineering team's on-call or triage rotation.

author: OpenEnv Community
license: MIT

task_type: sequential_decision
domain: software_engineering
real_world: true

observation_space:
  type: object
  description: Current bug report with metadata and conversation history
  fields:
    - bug_id: string
    - title: string
    - description: string
    - reporter: string
    - created_at: string
    - logs: string
    - stack_trace: string
    - environment: object
    - history: array
    - step_count: integer
    - max_steps: integer

action_space:
  type: object
  description: Agent actions including classification, routing, and response
  fields:
    - action_type: enum[classify_severity, assign_team, request_info, add_label, resolve, escalate, add_comment]
    - severity: enum[critical, high, medium, low, informational]
    - team: enum[backend, frontend, infrastructure, security, data, mobile, unknown]
    - labels: array[string]
    - comment: string
    - resolution: string
    - needs_info: array[string]

tasks:
  - id: easy_triage
    name: Basic Bug Severity Classification
    difficulty: easy
    description: >
      Given a clear bug report with obvious symptoms, correctly classify
      severity and assign to the right team within 3 steps.
    max_steps: 5
    success_threshold: 0.7

  - id: medium_investigation
    name: Incomplete Bug Report Investigation
    difficulty: medium
    description: >
      Handle an incomplete bug report: identify missing information,
      request it, then classify and route correctly after receiving it.
    max_steps: 8
    success_threshold: 0.75

  - id: hard_triage
    name: Ambiguous Multi-System Incident
    difficulty: hard
    description: >
      Triage a complex incident involving multiple systems, partial logs,
      conflicting severity signals, and a security implication. Agent must
      correctly identify the security vector, escalate appropriately, and
      provide a correct initial investigation plan.
    max_steps: 10
    success_threshold: 0.85

endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  health: /health

docker:
  base_image: python:3.11-slim
  port: 7860

huggingface:
  sdk: gradio
  app_file: app.py
